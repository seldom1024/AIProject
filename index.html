<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霓虹方块 · 俄罗斯方块</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-layer bg-layer-1"></div>
  <div class="bg-layer bg-layer-2"></div>

  <main class="app">
    <header class="title-wrap">
      <h1>霓虹方块</h1>
      <p>网页版俄罗斯方块</p>
    </header>

    <section class="game-shell">
      <aside class="panel">
        <div class="stat-grid">
          <article class="stat-card">
            <h2>分数</h2>
            <p id="score">0</p>
          </article>
          <article class="stat-card">
            <h2>消行</h2>
            <p id="lines">0</p>
          </article>
          <article class="stat-card">
            <h2>等级</h2>
            <p id="level">1</p>
          </article>
        </div>

        <div class="mini-wrap">
          <section class="mini-card">
            <h3>下一个</h3>
            <canvas id="nextCanvas" width="128" height="128" aria-label="下一个方块预览"></canvas>
          </section>
          <section class="mini-card">
            <h3>暂存</h3>
            <canvas id="holdCanvas" width="128" height="128" aria-label="暂存方块预览"></canvas>
          </section>
        </div>

        <button id="restartBtn" class="primary-btn" type="button">重新开始</button>
      </aside>

      <section class="board-panel">
        <canvas id="gameCanvas" width="320" height="640" aria-label="俄罗斯方块主游戏画布"></canvas>
        <div id="overlay" class="overlay hidden" aria-live="polite">
          <h2 id="overlayTitle">游戏结束</h2>
          <p id="overlayText">按回车键重新开始</p>
        </div>
      </section>

      <aside class="panel controls-panel">
        <h2>操作</h2>
        <ul class="tips">
          <li>←/→：左右移动</li>
          <li>↑：旋转</li>
          <li>↓：加速下落</li>
          <li>空格：直接落底</li>
          <li>C：暂存交换</li>
          <li>P：暂停继续</li>
        </ul>

        <div class="touch-controls">
          <button data-action="left" type="button">左移</button>
          <button data-action="rotate" type="button">旋转</button>
          <button data-action="right" type="button">右移</button>
          <button data-action="down" type="button">下落</button>
          <button data-action="drop" type="button">落底</button>
          <button data-action="hold" type="button">暂存</button>
          <button data-action="pause" type="button">暂停</button>
        </div>
      </aside>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
